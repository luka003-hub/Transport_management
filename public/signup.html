<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Register | Transport DMS</title>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-800 p-6 md:p-8 rounded-xl shadow-2xl w-full max-w-lg border-b-4 border-emerald-500 my-10">
        <div class="text-center mb-8">
            <h1 class="text-xl md:text-2xl font-bold text-white uppercase tracking-wider">Operator Registration</h1>
            <p class="text-slate-400 text-sm">Create a new system observer account</p>
        </div>
        
        <form id="signupForm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-slate-300 text-xs font-bold mb-2 uppercase">Full Name</label>
                    <input type="text" name="fullName" placeholder="John Doe" class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-slate-300 text-xs font-bold mb-2 uppercase">Staff ID (Username)</label>
                    <input type="text" name="username" placeholder="ZT-2024-00" required class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-emerald-500">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-slate-300 text-xs font-bold mb-2 uppercase">Official Email</label>
                <input type="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" placeholder="staff@zetech.ac.ke" required class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-emerald-500">
            </div>
            <div class="mb-6">
                <label class="block text-slate-300 text-xs font-bold mb-2 uppercase">Create Password</label>
                <input type="password" name="password" placeholder="••••••••" required class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-emerald-500">
            </div>
            
            <input type="hidden" name="role" value="admin">
            
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Register Account
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-slate-400 hover:underline">Already have an account? Login</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    alert("Registration Successful! Redirecting to login...");
                    window.location.href = '/index.html';
                } else {
                    alert(result.msg || "Registration failed.");
                }
            } catch (err) {
                alert("Server error. Check if the backend is running.");
            }
        });
    </script>
</body>
</html>
