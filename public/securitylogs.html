<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Security Audit | T-DMS</title>
</head>
<body class="bg-slate-900 text-slate-200 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-white">Security Audit Logs</h2>
            <a href="dashboard.html" class="text-blue-400 hover:underline">← Back to Dashboard</a>
        </div>
        
        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-700 text-slate-400 text-xs uppercase">
                    <tr>
                        <th class="px-6 py-4">IP Address</th>
                        <th class="px-6 py-4">Action/Event</th>
                        <th class="px-6 py-4">Status</th>
                    </tr>
                </thead>
                <tbody id="securityLogTable" class="divide-y divide-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadSecurityLogs() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/security/logs', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const logs = await res.json();
            
            document.getElementById('securityLogTable').innerHTML = logs.map(log => `
                <tr class="hover:bg-slate-750">
                    <td class="px-6 py-4 font-mono text-sm">${log.ip}</td>
                    <td class="px-6 py-4 text-sm">${log.action}</td>
                    <td class="px-6 py-4">
                        <span class="${log.blocked ? 'text-red-400' : 'text-yellow-400'} text-xs font-bold">
                            ${log.blocked ? '⛔ BLOCKED' : '⚠️ FLAGGED'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }
        window.onload = loadSecurityLogs;
    </script>
</body>
</html>
