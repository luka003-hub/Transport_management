<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Manage Fleet | T-DMS</title>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6">Register New Vehicle</h2>
        <form id="vehicleForm" class="space-y-4">
            <input type="text" id="regNumber" placeholder="Reg Number (e.g. KCC 123X)" class="w-full p-3 border rounded" required>
            <input type="text" id="route" placeholder="Assigned Route" class="w-full p-3 border rounded" required>
            <input type="text" id="driver" placeholder="Driver Name" class="w-full p-3 border rounded" required>
            <div class="flex flex-col md:flex-row gap-4">
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Add Vehicle</button>
                <a href="dashboard.html" class="w-full bg-slate-200 text-center p-3 rounded font-bold text-slate-700">Back</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                regNumber: document.getElementById('regNumber').value,
                route: document.getElementById('route').value,
                driver: document.getElementById('driver').value,
                status: "Active"
            };
            const res = await fetch('/api/vehicles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify(data)
            });
            if (res.ok) { alert("Vehicle Added!"); window.location.href = '/dashboard.html'; }
        });
    </script>
</body>
</html>
