<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Record Trip | T-DMS</title>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white p-6 md:p-8 rounded-xl shadow-md border-t-4 border-blue-500">
        <h2 class="text-2xl font-bold mb-6 text-slate-800">Record New Trip</h2>
        
        <form id="tripForm" class="space-y-4">
            <select id="vehicleReg" class="w-full p-3 border rounded bg-slate-50 text-slate-700 outline-none focus:ring-2 focus:ring-blue-500" required>
                <option value="" disabled selected>Loading your fleet...</option>
            </select>
            
            <input type="text" id="route" placeholder="Route (e.g. Nairobi - Juja)" class="w-full p-3 border rounded bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" required>
            <input type="text" id="driver" placeholder="Driver Name" class="w-full p-3 border rounded bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" required>
            <input type="number" id="revenue" placeholder="Revenue Collected (KES)" class="w-full p-3 border rounded bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" required>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded font-bold transition disabled:opacity-50 disabled:cursor-not-allowed">Securely Log Trip</button>
            <a href="dashboard.html" class="block text-center text-slate-500 hover:text-slate-800 font-bold text-sm mt-4 transition">Cancel</a>
        </form>
    </div>

    <script>
        // THE FIX: Automatically load the user's vehicles on page load
        async function loadVehicles() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = '/index.html';

            try {
                const res = await fetch('/api/vehicles', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const vehicles = await res.json();
                const selectElement = document.getElementById('vehicleReg');
                const submitBtn = document.getElementById('submitBtn');

                if (!res.ok || vehicles.length === 0) {
                    selectElement.innerHTML = '<option value="" disabled selected>No vehicles registered in your fleet.</option>';
                    submitBtn.disabled = true; // Prevent submission if no vehicles exist
                } else {
                    selectElement.innerHTML = '<option value="" disabled selected>Select a Vehicle</option>' + 
                        vehicles.map(v => `<option value="${v.regNumber}">${v.regNumber}</option>`).join('');
                }
            } catch (err) {
                console.error("Failed to load vehicles:", err);
            }
        }

        document.getElementById('tripForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                vehicleReg: document.getElementById('vehicleReg').value,
                route: document.getElementById('route').value,
                driver: document.getElementById('driver').value,
                revenue: Number(document.getElementById('revenue').value)
            };
            
            try {
                const res = await fetch('/api/transit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) { 
                    alert("Trip Encrypted and Logged Successfully!"); 
                    window.location.href = '/dashboard.html'; 
                } else {
                    const errorData = await res.json();
                    alert(errorData.error || "Failed to record trip.");
                }
            } catch(err) {
                alert("Server error.");
            }
        });

        // Initialize dropdown
        window.onload = loadVehicles;
    </script>
</body>
</html>
