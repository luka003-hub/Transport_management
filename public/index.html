<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | Transport DMS</title>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-800 p-6 md:p-8 rounded-xl shadow-2xl w-full max-w-md border-b-4 border-blue-500">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white uppercase tracking-wider">Transport DMS</h1>
            <p class="text-slate-400 text-sm">Secure Management Portal</p>
        </div>
        <form id="loginForm">
            <div class="mb-5">
                <label class="block text-slate-300 text-sm font-semibold mb-2">Staff ID (Username)</label>
                <input type="text" name="username" id="username" placeholder="e.g. ZT-2024-01" required class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-slate-300 text-sm font-semibold mb-2">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Authenticate
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="signup.html" class="text-sm text-blue-400 hover:underline">Request Access Credentials</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard.html';
                } else {
                    alert(data.msg || "Authentication Failed");
                }
            } catch (err) {
                console.error(err);
                alert("Server error. Check if the backend is running.");
            }
        });
    </script>
</body>
</html>
